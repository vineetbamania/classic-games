<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>CloudFM</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: linear-gradient(165deg, #141b30 0%, #070a12 70%);
                color: #e6edf3;
                font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue",
                    Arial, sans-serif;
                font-size: 12px;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
            }
            .app {
                display: flex;
                flex-direction: column;
                width: 100%;
                height: 100%;
            }
            .hdr {
                flex: 0 0 auto;
                padding: 7px 10px;
                font-weight: 700;
                letter-spacing: 0.5px;
                color: #fff;
                background: rgba(78, 161, 255, 0.08);
                border-bottom: 1px solid rgba(255, 255, 255, 0.07);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .body {
                flex: 1 1 auto;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 4px 0;
            }
            .ftr {
                flex: 0 0 auto;
                padding: 5px 10px;
                font-size: 9px;
                color: #6b7888;
                background: rgba(0, 0, 0, 0.25);
                border-top: 1px solid rgba(255, 255, 255, 0.06);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            /* ---- list rows ---- */
            .row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin: 3px 6px;
                padding: 7px 9px;
                border-radius: 9px;
                background: rgba(255, 255, 255, 0.03);
                white-space: nowrap;
                overflow: hidden;
            }
            .row .nm {
                flex: 1 1 auto;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .row .sub {
                color: #8a97a6;
            }
            .row .mt {
                flex: 0 0 auto;
                color: #6b7888;
                font-size: 9px;
            }
            .row.sel {
                background: linear-gradient(
                    90deg,
                    rgba(78, 161, 255, 0.28),
                    rgba(78, 161, 255, 0.1)
                );
                box-shadow: inset 3px 0 0 #4ea1ff;
                color: #fff;
            }
            .row.sel .sub,
            .row.sel .mt {
                color: #cdd9e5;
            }
            .msg {
                padding: 22px 14px;
                text-align: center;
                color: #6b7888;
                line-height: 1.5;
            }
            .search-in {
                display: none;
                width: calc(100% - 16px);
                margin: 10px 8px 0;
                padding: 8px 10px;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid #4ea1ff;
                border-radius: 9px;
                color: #fff;
                font-family: inherit;
                font-size: 14px;
                outline: none;
            }
            /* ---- now-playing / player ---- */
            .player {
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 10px 12px 4px;
                gap: 4px;
            }
            .art {
                width: min(46vmin, 128px);
                height: min(46vmin, 128px);
                border-radius: 14px;
                background: #1b2540 center/cover no-repeat;
                box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 30px;
                color: #4ea1ff;
                flex: 0 0 auto;
            }
            .ptitle {
                margin-top: 8px;
                font-size: 14px;
                font-weight: 700;
                color: #fff;
                text-align: center;
                max-width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .partist {
                font-size: 11px;
                color: #8a97a6;
                text-align: center;
            }
            .bar {
                width: 92%;
                height: 5px;
                margin-top: 9px;
                background: rgba(255, 255, 255, 0.12);
                border-radius: 3px;
                overflow: hidden;
            }
            .fill {
                height: 100%;
                background: linear-gradient(90deg, #4ea1ff, #8ac0ff);
                border-radius: 3px;
            }
            .ptime {
                width: 92%;
                display: flex;
                justify-content: space-between;
                font-size: 9px;
                color: #6b7888;
                margin-top: 3px;
            }
            .live {
                margin-top: 9px;
                font-size: 11px;
                color: #ff6b6b;
                font-weight: 700;
                letter-spacing: 1px;
            }
            .transport {
                display: flex;
                align-items: center;
                gap: 14px;
                margin-top: 12px;
            }
            .tbtn {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.07);
                border: 1px solid rgba(255, 255, 255, 0.12);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
                color: #cdd9e5;
                position: relative;
            }
            .tbtn.play {
                width: 46px;
                height: 46px;
                background: #4ea1ff;
                color: #04101f;
                font-size: 17px;
                box-shadow: 0 4px 14px rgba(78, 161, 255, 0.45);
            }
            .tbtn i {
                position: absolute;
                bottom: -13px;
                font-size: 8px;
                font-style: normal;
                color: #6b7888;
            }
            .pvol {
                margin-top: 20px;
                font-size: 11px;
                color: #8a97a6;
                letter-spacing: 1px;
            }
            .pstatus {
                margin-top: 6px;
                font-size: 10px;
                color: #4ea1ff;
                min-height: 13px;
            }
            @media (max-width: 140px), (max-height: 170px) {
                html,
                body {
                    font-size: 10px;
                }
                .ptitle {
                    font-size: 12px;
                }
                .tbtn {
                    width: 28px;
                    height: 28px;
                    font-size: 11px;
                }
                .tbtn.play {
                    width: 38px;
                    height: 38px;
                }
                .ftr {
                    font-size: 8px;
                }
            }
        </style>
    </head>
    <body>
        <div class="app">
            <div class="hdr" id="hdr">CloudFM</div>
            <input
                id="q"
                class="search-in"
                type="text"
                autocomplete="off"
                placeholder="Search…"
            />
            <div class="body" id="body"></div>
            <div class="ftr" id="ftr"></div>
        </div>
        <audio id="audio"></audio>

        <!-- Modules load in order; app.js boots last.
             api.js       - Radio-Browser (free/open) radio stations + genres
             songs.js     - Audius (free/open) full-length songs: trending + search
             favorites.js - localStorage favourites (tracks + stations)
             player.js    - <audio> wrapper (play/pause/volume/seek/state)
             ui.js        - DOM rendering of the current screen
             app.js       - screen-stack state machine, T9/D-pad input, boot -->
        <script src="js/api.js"></script>
        <script src="js/songs.js"></script>
        <script src="js/favorites.js"></script>
        <script src="js/player.js"></script>
        <script src="js/ui.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
