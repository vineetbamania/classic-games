<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Bounce</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #020812;
                font-family: "Courier New", monospace;
                touch-action: none;
                user-select: none;
                -webkit-touch-action: none;
                -webkit-user-select: none;
            }
            .wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
                gap: 4px;
                padding: 4px;
            }
            canvas {
                border: 2px solid #0a3060;
                border-radius: 4px;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
                width: min(100vw - 16px, 100vh - 48px, 256px);
                height: min(100vw - 16px, 100vh - 48px, 256px);
                aspect-ratio: 1/1;
                background: #B0E0F0;
            }
            .hud {
                display: flex;
                justify-content: space-between;
                width: min(100vw - 16px, 256px);
                color: #5a8ab0;
                font-size: 10px;
                padding: 0 4px;
            }
            .hud .hearts {
                color: #e44;
            }
            @media (max-width: 140px), (max-height: 160px) {
                .hud {
                    font-size: 8px;
                }
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <canvas id="c"></canvas>
            <div class="hud">
                <span id="hlvl">Level 1</span
                ><span id="hlives" class="hearts">♥♥♥</span
                ><span id="hscore">Score: 0</span>
            </div>
        </div>

        <!-- Engine modules, loaded in dependency order; game.js boots last.
             leveldata.js  - LEVELS global (decoded from the original JAR)
             atlas.js      - reverse-engineered tile atlas + recipe + builder
             audio.js      - synthesized WebAudio sound effects
             input.js      - D-pad / T9 keypad / soft-key handling
             render.js     - all canvas drawing
             game.js       - constants, state, physics, loop, boot -->
        <script src="js/leveldata.js"></script>
        <script src="js/atlas.js"></script>
        <script src="js/audio.js"></script>
        <script src="js/input.js"></script>
        <script src="js/render.js"></script>
        <script src="js/game.js"></script>
    </body>
</html>
